interface:
  display_name: "Bugs Flow"
  short_description: "Run the standalone analyze, fix, and review bug workflow against one bug doc"
  default_prompt: "Use $bugs-flow to investigate a bug from evidence and implement the smallest credible fix. Treat the human-authorized corrected behavior, frozen closure, safety constraints, and proof obligations as binding; keep the bug doc's hypotheses, likely cause, and candidate fix plan challengeable unless a human explicitly selected them. During analyze only, record the smallest directly competing same-contract closure or `none` and freeze it before fix mode. Fix and review cannot expand that closure; a later adjacent improvement needs a human decision, and unauthorized built scope is subtracted. Apply the shared agent policy and $prompt-authoring to actual populated child briefs: preserve the exact clean implementer for accepted repairs while allowing evidence-backed rebuttal, start every independent review or recheck as a different new clean same-host native read-only critic, prohibit unassigned nested fanout, and have the parent check current repository state, account for every result, own bug-doc writes and scope dispositions, and declare the final verdict. Review side work remains explicit-review-only. External review remains available when a concrete provider, model, lifecycle, isolation, automation, receipt, or other benefit is worth its added process and integration cost."

policy:
  allow_implicit_invocation: true
