interface:
  display_name: "Agent Delegate"
  short_description: "Run Claude/Codex/Cursor Agent workers, fresh by default"
  default_prompt: "Use $agent-delegate to delegate one or more concrete tasks to Claude, Codex, or Cursor Agent workers with full local agent capabilities. Run fresh by default; use explicit same-session resume only if I provide a prior run/session handle or require continuity. Report the mode, status, changed files, verification, blockers, session id when present, and run directories."

policy:
  allow_implicit_invocation: true
