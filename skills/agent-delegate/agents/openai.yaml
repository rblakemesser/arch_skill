interface:
  display_name: "Agent Delegate"
  short_description: "Run explicit external editful worker sessions"
  default_prompt: "Use $agent-delegate only when an external Claude, Codex, Cursor Agent, or Grok worker provides a concrete provider, exact-model/profile, lifecycle, process-isolation, automation, or structured-receipt benefit over the active host's native children. Keep ordinary same-host work native. For the external lane, preserve exact model/profile resolution (Codex defaults an omitted model to gpt-5.6-sol), start clean and resumable by default, and resume only an exact same-runtime handle. The parent owns fanout and integration; workers must not create children unless a bounded nested scope and concurrency budget are explicit. Report the external benefit, mode, status, changed files, verification, blockers, exact session handle, and run directories."

policy:
  allow_implicit_invocation: true
