interface:
  display_name: "Agent Delegate"
  short_description: "Run explicit external editful worker sessions"
  default_prompt: "Use $agent-delegate only when an external Claude, Codex, Cursor Agent, Grok, or Kimi worker provides a concrete provider, exact-model/profile, lifecycle, process-isolation, automation, or structured-receipt benefit over the active host's native children. Keep ordinary same-host work native. Preserve exact model/profile resolution: Codex defaults an omitted model to gpt-5.6-sol and an omitted Sol effort to ultra; Kimi defaults to kimi-code/k3 at max; natural Grok wording resolves to grok-4.5 while explicit legacy ids remain exact. Start clean and resumable by default, and resume only an exact same-runtime handle. The parent owns fanout and integration; workers must not create children unless a bounded nested scope and concurrency budget are explicit. Report the external benefit, mode, status, changed files, verification, blockers, exact session handle, and run directories."

policy:
  allow_implicit_invocation: true
