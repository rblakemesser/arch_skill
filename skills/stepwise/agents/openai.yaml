interface:
  display_name: "Stepwise"
  short_description: "Run ordered skill steps with exact-worker repair"
  default_prompt: "Use $stepwise to turn the named process into a user-confirmed manifest, then run every independent step with a new clean worker and a new clean observational critic. Apply $prompt-authoring to each actual populated brief. Prefer native same-host children, resume the exact worker for diagnosis and repair, and start downstream replacements clean after repaired upstream truth invalidates their context. Use the external adapter only for a deliberate provider, exact-model, lifecycle, isolation, automation, receipt, or comparable benefit. Keep context separate from permissions and worktree posture. The parent owns fanout, evidence synthesis, repair-brief authorship, and integration; only the user, confirmed manifest, and owner runbook authorize repair requirements, while critic evidence and parent diagnoses remain disputable leads and the worker owns the in-scope repair path. Child prompts forbid nested delegation unless explicitly assigned. Preserve the manifest, repair-bounce, diagnostic-turn, evidence, authority-tag, and stop-discipline gates without inventing constraints or completion proof, and report a critic pass only as evidence for its declared active checks rather than a broad quality verdict."

policy:
  allow_implicit_invocation: true
