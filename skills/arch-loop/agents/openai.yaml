interface:
  display_name: "Arch Loop"
  short_description: "Generic hook-backed completion loop with external Codex audit"
  default_prompt: "Use $arch-loop when the user wants the same visible Codex or Claude Code thread to keep working or keep checking free-form requirements until a fresh external Codex `gpt-5.4` `xhigh` audit says the requirements are clean, more work is needed, the loop should wait/recheck on a parsed cadence, blocked, or a parsed runtime/cadence/iteration cap is reached. Preserve the user's request literally in `raw_requirements`; parse only unambiguous runtime windows, cadences, and iteration caps into machine constraints (ambiguous caps or cadences fail loud before arming). Detect explicitly named audits such as `$agent-linter` and add them to `required_skill_audits`; each audit `status` must be exactly `pending`, `pass`, `fail`, `missing`, or `inapplicable`, with progress words kept in `latest_summary`. The installed runner is the shared suite hook at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`; the repo-managed `Stop` entry must point at that runner with `--runtime codex` in `~/.codex/hooks.json` or `--runtime claude` in `~/.claude/settings.json`. In Codex, preflight also includes `codex_hooks`. Do not invent a separate `arch_loop_controller.py` runner. Do one bounded work pass or one immediate grounded check, then end the turn naturally and let the installed Stop hook own continuation, wait/recheck, and the fresh external Codex `gpt-5.4` `xhigh` evaluator that owns the stop verdict. Not for specialized full-arch plans (`$arch-step`), repo audits (`$audit-loop`, `$comment-loop`, `$audit-loop-sim`), docs suite continuation (`$arch-docs auto`), pure wait-until-true checks better owned by `$delay-poll`, one-shot reviews, or ordinary implementation that should finish in one turn."

policy:
  allow_implicit_invocation: true
