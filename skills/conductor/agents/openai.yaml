interface:
  display_name: "Conductor"
  short_description: "Plan-or-outcome conductor with executive shaping and a cheap external fleet"
  default_prompt: "Use $conductor to drive a finished plan, partial plan, or described outcome to verified completion with the parent as executive architect, scope judge, integrator, and cynical non-implementing reviewer while capable workers own implementation judgment inside authorized slices. For outcome or partial-plan intake, first run the executive shaping stage: parallel research workers propose as evidence, the parent trims to the smallest sufficient solution, writes the outcome map with observable done-ness and non-goals, and takes one user scope approval (or an explicit full-auto grant) that freezes the boundary; never dispatch before the readiness gate passes, and never waive it. Default execution is the cheap parallel external fleet — Codex gpt-5.6-sol at ultra through $agent-delegate, with one-word fleet swaps to Kimi, Grok, Cursor, or Claude — chosen deliberately to preserve parent context and buy fast cheap worker cycles; use native children by request or fit. Rotate Codex usage limits via aim and resume the exact session. Apply $prompt-authoring to each populated child brief, resume the exact worker for accepted repair findings, start cold critics clean, and keep the explicit Terra preset external and exact. Audit factual validity separately from scope authority: only authorized and frozen-convergence findings become send-backs; new scope needs a human, unauthorized built scope is subtracted, and review repetition never creates authority."

policy:
  allow_implicit_invocation: true
