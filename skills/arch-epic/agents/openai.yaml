interface:
  display_name: "Arch Epic"
  short_description: "Run a fixed-scope epic through ordered arch-step sub-plans"
  default_prompt: "Use $arch-epic to decompose a human-authorized epic into an approved ordered baseline, then run one sub-plan at a time. Prefer clean native same-host planner, implementation-worker, and critic children from the durable epic/sub-plan artifacts; resume the exact planner or worker for repair and start every independent critic clean. Use the explicit external harness only for a deliberate provider, exact-model, lifecycle, isolation, automation, receipt, or comparable benefit. The parent owns sequencing, fanout, and integration; child prompts forbid nested delegation unless explicitly assigned. Decomposition approval does not authorize hidden infrastructure. Each sub-plan inherits the epic boundary, may add only the smallest evidenced same-contract convergence closure during initial architecture, and freezes that closure before implementation. After freeze, critics and workers cannot add scope or sub-plans. Missing authorized work resumes the owning role; new scope needs an explicit human decision; unauthorized built scope is subtracted unless a human approves and re-freezes it. Decision Log entries record decisions but do not create authority. Critics must check scope provenance and cycling before a sub-plan can pass."

policy:
  allow_implicit_invocation: true
