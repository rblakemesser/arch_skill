display_name: "Cynical Architecture Review"
short_description: "Find accidental architecture, sprawl, split ownership, and needless complexity."
default_prompt: "Use $cynical-architecture-review to review the requested branch, diff, subsystem, plan-backed implementation, or code area. Assume the architecture may have emerged accidentally through iteration, preserve the intended UX and hard experiment requirements, hunt for sprawl, invalid split ownership, duplicate truth, accidental abstractions, compatibility shims, flags-as-architecture, registries, adapters, state spread, wrong decomposition, and complexity not forced by requirements, then save the findings-first artifact under /tmp/cynical-architecture-review/. Do not edit code, run external review/delegation skills, manually spawn coding-harness executables, build a runner/harness, or drift into QA/test/doc review unless the user explicitly asks."
