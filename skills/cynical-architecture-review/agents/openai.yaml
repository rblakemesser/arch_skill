interface:
  display_name: "Cynical Architecture Review"
  short_description: "Find accidental architecture, sprawl, split ownership, and needless complexity."
  default_prompt: "Use $cynical-architecture-review to review the requested architecture subtraction-first. Put human-authorized UX and constraints, the initial pre-freeze minimal convergence closure, and explicit later human approvals ahead of the latest implementation story. For plan-, branch-, conductor-, PR-, or history-backed work, require every durable concept to trace to one of those anchors. Hard-fail scope-cycled or unauthorized post-freeze architecture as REQUIRED REPAIR with verdict not-approved, even when current code and later plan text call it required; default to subtracting the cluster, not inventing another generalized system. A newly discovered relationship still needs a human decision. Also hunt sprawl, invalid split ownership, duplicate truth, accidental abstractions, shims, flags, registries, adapters, state spread, wrong decomposition, and needless complexity. For broad reviews, apply the shared agent policy and use only as many non-overlapping new clean native read-only children as improve coverage; children do not fan out unless the parent assigns a nested scope and budget, and the parent accounts for evidence and checks repository state. Save under /tmp/cynical-architecture-review/. Do not edit code, invoke external reviewers, manually spawn coding-harness executables, build a runner/harness, or drift into QA/test/doc review unless asked."

policy:
  allow_implicit_invocation: true
