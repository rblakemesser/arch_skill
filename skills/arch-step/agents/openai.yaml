interface:
  display_name: "Arch Step"
  short_description: "Run the standalone full-arch workflow against one canonical plan artifact and converge onto canonical repo paths"
  default_prompt: "Use $arch-step for the full arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `external-research`, `phase-plan`, `auto-plan`, `plan-enhance`, `fold-in`, `overbuild-protector`, `consistency-pass`, `review-gate`, `implement`, `implement-loop`, `auto-implement`, `full-auto`, `audit-implementation`, `status`, or `advance`. Build the human-authorized outcome with the smallest sufficient solution. During initial architecture only, include the smallest evidenced same-contract cutover needed to avoid competing authority, record it in the Scope and Simplicity Contract, and freeze it before implementation. After freeze, only explicit human approval expands scope; workers, reviewers, plan edits, and Decision Log entries do not. A newly discovered adjacent path becomes a human decision, not an automatic repair. For modern Section 7 docs, every required phase obligation must live in `Checklist (must all be done)` or `Exit criteria (all required)`, and fresh audit must validate both before a phase can stay complete. During `implement` and `implement-loop`, execute only the frozen approved frontier and subtract unauthorized work. `auto-plan`, `implement-loop`, `auto-implement`, and `full-auto` are native goal-mode friendly commands; this package does not install or arm automation hooks. In goal mode, continue until the command's proof bar is met or a true blocker stops the run. Outside goal mode, run one bounded stage or implement/audit pass and name the exact next command. For `auto-plan`, use `scripts/arch_stage_gate.py` receipts so research, two deep-dive passes, phase-plan, and consistency-pass each run as real commands before the plan is ready. For `consistency-pass`, use two new clean same-host native read-only explorers with disjoint scope/execution-authority and architecture/proof-chain lenses, explicit no-write/no-fanout briefs, and parent-owned repo-state verification and synthesis; Codex uses `fork_turns: \"none\"`, while Claude Code uses clean named or custom subagents. For `full-auto`, read `references/full-auto.md`, require the receipt gate and `consistency-pass` to approve implementation readiness, and plan before implementation. After a clean full-arch code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
