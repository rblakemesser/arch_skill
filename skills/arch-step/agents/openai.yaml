interface:
  display_name: "Arch Step"
  short_description: "Run the standalone full-arch workflow against one canonical plan artifact and converge onto canonical repo paths"
  default_prompt: "Use $arch-step for the full arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `external-research`, `phase-plan`, `auto-plan`, `plan-enhance`, `fold-in`, `overbuild-protector`, `consistency-pass`, `review-gate`, `implement`, `implement-loop`, `auto-implement`, `audit-implementation`, `status`, or `advance`. Internal refactors may widen enough to converge onto canonical repo paths, remove duplicate truth, and prevent drift, but the workflow must not invent new product functionality, modes, or speculative infrastructure while doing it. Do not declare a plan ready while unresolved decisions remain, do not silently cut approved behavior or implementation scope, and do not rewrite plan requirements, scope, acceptance criteria, or phase obligations during implementation to make unfinished work look done; if repo evidence cannot settle a plan-shaping choice, ask the user instead of guessing. `auto-plan`, `implement-loop`, and `auto-implement` are the user-facing controller commands; do not run the Stop hook yourself, and after the controller is armed just end the turn and let Codex run the installed Stop hook. For hook-backed preflight, verify `~/.codex/hooks.json` plus the installed runner at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`; do not look for a copied hook file under `~/.codex/hooks/`. For `auto-plan`, the parent pass must run only `research`, then end its turn; the Stop hook alone feeds one later planning command per turn through `deep-dive`, `phase-plan`, and `consistency-pass`, and only then owns the successful handoff. If the installed runtime support is absent or disabled, fail loud instead of pretending prompt-only chaining is real automation. After a clean full-arch code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
