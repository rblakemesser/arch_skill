interface:
  display_name: "Arch Step"
  short_description: "Run the standalone full-arch workflow against one canonical plan artifact and converge onto canonical repo paths"
  default_prompt: "Use $arch-step for the full arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `external-research`, `phase-plan`, `auto-plan`, `plan-enhance`, `fold-in`, `overbuild-protector`, `consistency-pass`, `review-gate`, `implement`, `implement-loop`, `auto-implement`, `full-auto`, `audit-implementation`, `status`, or `advance`. Internal refactors may widen enough to converge onto canonical repo paths, remove duplicate truth, and prevent drift, but the workflow must not invent new product functionality, modes, or speculative infrastructure while doing it. Before Section 7 hardens, inspect adjacent surfaces tied to the same contract family, source of truth, migration boundary, or parity story; include them now, assign them to a named later phase, explicitly exclude them, or ask one exact blocker question instead of silently leaving them contradictory. For modern Section 7 docs, every required phase obligation must live in `Checklist (must all be done)` or `Exit criteria (all required)`, and fresh audit must validate both before a phase can stay complete. During `implement` and `implement-loop`, execute the current approved ordered implementation frontier: the earliest incomplete or reopened phase plus later phases whose prerequisites and proof gates are reachable in this arc. `auto-plan`, `implement-loop`, `auto-implement`, and `full-auto` are native goal-mode friendly commands; this package does not install or arm automation hooks. In goal mode, continue until the command's proof bar is met or a true blocker stops the run. Outside goal mode, run one bounded stage or implement/audit pass and name the exact next command. For `auto-plan`, run research, two deep-dive passes, phase-plan, and consistency-pass from doc truth. For `full-auto`, read `references/full-auto.md`, require `consistency-pass` to approve implementation readiness, and plan before implementation. After a clean full-arch code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
