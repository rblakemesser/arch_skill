interface:
  display_name: "Arch Step"
  short_description: "Run the standalone full-arch workflow against one canonical plan artifact and converge onto canonical repo paths"
  default_prompt: "Use $arch-step for the full arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `external-research`, `phase-plan`, `auto-plan`, `plan-enhance`, `fold-in`, `overbuild-protector`, `consistency-pass`, `review-gate`, `implement`, `implement-loop`, `auto-implement`, `audit-implementation`, `status`, or `advance`. Internal refactors may widen enough to converge onto canonical repo paths, remove duplicate truth, and prevent drift, but the workflow must not invent new product functionality, modes, or speculative infrastructure while doing it. `auto-plan`, `implement-loop`, and `auto-implement` are the user-facing controller commands; do not run the Stop hook yourself, and after the controller is armed just end the turn and let Codex run the installed Stop hook. For `auto-plan`, the parent pass must run only `research`, then end its turn; the Stop hook alone feeds one later planning command per turn through `deep-dive`, `phase-plan`, and `consistency-pass`, and only then owns the successful handoff. If the installed runtime support is absent or disabled, fail loud instead of pretending prompt-only chaining is real automation. After a clean full-arch code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
