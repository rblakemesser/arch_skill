interface:
  display_name: "Codex Babysit"
  short_description: "Keep a running codex goal-mode tmux session alive across usage limits"
  default_prompt: "Use $codex-babysit only as a watchdog for the exact Codex goal-mode session already running in tmux. Apply the shared agent-orchestration policy: do not launch or repurpose a worker, rotate the aim account only on a real usage limit, restart and resume the same session id, verify that the same goal actually resumed, and keep watching until Codex's own goal genuinely completes."

policy:
  allow_implicit_invocation: true
