interface:
  display_name: "Delay Poll"
  short_description: "Wait and re-check an external condition on a fixed interval"
  default_prompt: "Use $delay-poll when the user wants Codex or Claude Code to keep checking whether some external condition has become true every 30 minutes, every hour, or similar, then continue the same visible thread when it does. This is hook-backed: do one immediate grounded check first, arm the host-aware `delay-poll` controller state only if the condition is still false, and after the controller is armed just end the turn and let the installed Stop hook wait and re-check. State is schema version 2: the arming pass must store `check_prompt_hash = sha256(check_prompt)` and `resume_prompt_hash = sha256(resume_prompt)` in state, record `cap_evidence` for the interval and deadline, and verify that `interval_seconds` and `deadline_at - armed_at` both fit under the installed Stop-hook timeout; mutation of either prompt or an over-ceiling cap clears state loudly. The installed runner is the shared suite hook at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`. Every arm runs `arch_controller_stop_hook.py --ensure-installed --runtime <codex|claude>` first; the installer is idempotent and flock-guarded and writes the canonical `Stop` entry (and the `SessionStart` entry on Claude). If `--ensure-installed` fails loud, repair the named prerequisite and rerun. Do not invent or require a dedicated delay-specific controller file such as `delay_poll_controller.py`. In Claude Code, fresh checks also require hook-suppressed Claude child runs via `claude -p --settings '{\"disableAllHooks\":true}'` to work with normal host auth. Do not invent service-specific heuristics or treat this like a background daemon that survives after the session exits."

policy:
  allow_implicit_invocation: true
