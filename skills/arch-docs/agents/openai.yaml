interface:
  display_name: "Arch Docs"
  short_description: "Run a topic-first docs audit that grounds, trims, fixes, and organizes repo docs"
  default_prompt: "Use $arch-docs when the job is leaving repo docs healthier: remove stale truth, update stale surviving docs, clarify confusing docs, and promote grounded missing truth into canonical evergreen docs when the repo actually needs them. Start by profiling the repo docs surface and deciding whether the repo is best treated as `public OSS` or `private/internal`; if that is unclear, default to `private/internal` instead of guessing public. In `public OSS` repos, treat `README`, `LICENSE*`, `CONTRIBUTING.md`, `SECURITY.md`, `CODE_OF_CONDUCT.md`, and `SUPPORT.md` as expected standalone docs. For other missing docs, expand the current canonical home when it can carry the topic cleanly, and create a focused new doc only when readers would seek that topic directly and forcing it into the current home would make the docs worse. Use git history when staleness or datedness matters, delete stale truth after durable truth is folded forward, and repair navigation. Do not add speculative, aspirational, or duplicate docs. If active arch artifacts exist, use them as narrowing context rather than as the whole scope. Only use explicit `auto` when the user asks for hook-backed Codex automation; do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
