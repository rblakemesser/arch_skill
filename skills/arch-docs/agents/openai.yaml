interface:
  display_name: "Arch Docs"
  short_description: "Run a delete-first docs audit that retires stale point-in-time docs"
  default_prompt: >-
    Use $arch-docs when the job is aggressively retiring stale repo docs by grounding every keep/delete call against current code instead of trusting the docs themselves. Treat point-in-time implementation docs, worklogs, rollout notes, investigations, and similar wrappers as delete candidates by default; in this repo family, docs older than 30 days are presumed stale unless they still serve a current reader need proven from code and current shipped behavior. Do not trust folder names or freshness metadata such as `docs/living`, `Status: LIVING`, or `Last verified`. Fold durable truth into existing evergreen homes whenever it fits cleanly, and create a standalone evergreen doc only when readers would seek that topic directly and the split-versus-expand judgment says it deserves its own canonical home. Do not make stale docs look current by editing metadata alone. Use git history when datedness matters, make backup commits before bounded delete batches, repair navigation, and use active arch artifacts only as narrowing context rather than as the whole scope. Apply the shared agent policy to any mapping or evaluation: use non-overlapping new clean same-host native read-only children by default, prohibit unassigned nested fanout, and have the parent account for every result, check current repository state, synthesize accepted evidence, and own the final verdict. Only use explicit `auto` when the user asks for native goal-mode automation; run one DGTFO pass, run a new clean critic, then repeat until the parent accepts clean or blocked. A post-turn background or external launch supplies lifecycle continuity, not evaluator freshness. This package does not install or arm automation hooks.

policy:
  allow_implicit_invocation: true
