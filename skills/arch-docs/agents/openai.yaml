interface:
  display_name: "Arch Docs"
  short_description: "Run a topic-first docs audit that grounds, trims, fixes, and organizes repo docs"
  default_prompt: "Use $arch-docs when the job is leaving repo docs healthier: remove stale truth, update stale surviving docs, clarify confusing docs, and promote grounded missing truth into evergreen canonical docs when the repo clearly needs them. With no extra mode, run one normal DGTFO pass: orient to the repo doc system, inventory doc-shaped surfaces, ground topics against code, use git history when staleness or datedness matters, consolidate each topic to one canonical home, expand or author that canonical home when the current docs do not actually serve the reader, delete stale truth, and repair navigation. Treat time-bound one-off docs as delete candidates unless they still serve a clear lasting reader need. Do not add speculative, aspirational, or duplicate docs. If active arch artifacts exist, use them as narrowing context rather than as the whole scope. Only use explicit `auto` when the user asks for hook-backed Codex automation; do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
