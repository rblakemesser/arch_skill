interface:
  display_name: "Audit Loop Sim"
  short_description: "Run a repo-wide real-app automation audit loop with a root simulator ledger; supports Codex-only auto continuation"
  default_prompt: "Use $audit-loop-sim for a repo-wide real-app automation audit pass that finds and fixes the biggest simulator or emulator coverage gaps, missing high-value mobile end-to-end signal, and same-story bugs exposed by real-app runs. Push on the strongest unresolved automation risk until it is materially reduced; do not cash out on a tiny safe test tweak while a bigger justified journey gap still dominates. A pass may cross product code, integration tests, harness, fixtures, and native glue when they serve the same risk story. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current automation risk front or make verification unsafe. When the repo provides `mobile-sim`, use it for simulator or device control. If the current review context cannot inspect the sanctioned runtime surface cleanly, record that state as `unknown`, not `BLOCKED`. Do one bounded environment recovery before calling a simulator-required front blocked, and treat repeated lane-independent provider failures with no app signal as provider blockers. `review` is docs-only; `auto` is the Codex-only controller and must fail loud if the repo-managed `Stop` entry in `~/.codex/hooks.json`, the installed runner at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`, or `codex_hooks` is missing. Do not preflight against a copied hook file under `~/.codex/hooks/`. Missing controller state is not verdict truth. Do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
