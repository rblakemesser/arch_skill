interface:
  display_name: "Audit Loop Sim"
  short_description: "Run an exhaustive map-first real-app automation loop with a root simulator ledger; supports Codex-only auto continuation"
  default_prompt: "Use $audit-loop-sim for a repo-wide real-app automation audit pass that first exhaustively maps the app surfaces, user journeys, and current automation surface before any edits, then ranks automation risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick lane tweak before the map is complete. In runtimes that support delegation, use parallel read-only agents during the mapping phase; otherwise build the same map sequentially. Choose the front from that map, fix bugs inside the existing product, journey, and automation contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. Every editful pass must then audit the resulting diff and touched surfaces for safety, downstream consequences, elegance, and duplication before it can count as done. If that audit fails, repair the issue in the same pass and re-verify. Do not introduce duplicate product logic, duplicate lane behavior, duplicate harness steps, or duplicate fallback handling as a shortcut; converge on one truthful path without building a parallel harness family. A pass may widen into broader same-story cleanup when that is the cleanest way to remove new fragility or duplication without changing contracts. A pass may cross product code, integration tests, harness, fixtures, and native glue when they serve the same risk story. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current automation risk front or make verification unsafe. When the repo provides `mobile-sim`, use it for simulator or device control. If the current review context cannot inspect the sanctioned runtime surface cleanly, record that state as `unknown`, not `BLOCKED`. Do one bounded environment recovery before calling a simulator-required front blocked, and treat repeated lane-independent provider failures with no app signal as provider blockers. `review` is docs-only; `auto` is the Codex-only controller and must fail loud if the repo-managed `Stop` entry in `~/.codex/hooks.json`, the installed runner at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`, or `codex_hooks` is missing. Do not preflight against a copied hook file under `~/.codex/hooks/`. Missing controller state is not verdict truth. Do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
