interface:
  display_name: "Audit Loop Sim"
  short_description: "Run an exhaustive map-first real-app automation loop with a root simulator ledger; supports native goal-mode auto continuation"
  default_prompt: "Use $audit-loop-sim for a repo-wide real-app automation audit pass that first exhaustively maps the app surfaces, user journeys, and current automation surface before any edits, then ranks automation risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick lane tweak before the map is complete. In runtimes that support delegation, use parallel read-only agents during the mapping phase; otherwise build the same map sequentially. Choose the front from that map, fix bugs inside the existing product, journey, and automation contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. Every editful pass must then audit the resulting diff and touched surfaces for safety, downstream consequences, elegance, and duplication before it can count as done. Do not introduce duplicate product logic, duplicate lane behavior, duplicate harness steps, or duplicate fallback handling as a shortcut. When the repo provides `mobile-sim`, use it for simulator or device control. If the current review context cannot inspect the sanctioned runtime surface cleanly, record that state as `unknown`, not `BLOCKED`. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current automation risk front or make verification unsafe. `review` is docs-only. `auto` is native goal-mode friendly: run `run`, run fresh `review`, then repeat until review says `CLEAN` or `BLOCKED`. This package does not install or arm automation hooks."

policy:
  allow_implicit_invocation: true
