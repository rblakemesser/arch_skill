interface:
  display_name: "Audit Loop Sim"
  short_description: "Run an exhaustive map-first real-app automation loop with a root simulator ledger; supports native goal-mode auto continuation"
  default_prompt: "Use $audit-loop-sim for a repo-wide real-app automation audit pass that first exhaustively maps the app surfaces, user journeys, and current automation surface before any edits, then ranks automation risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick lane tweak before the map is complete. Apply the shared agent policy: when independent surface families justify fanout, use bounded non-overlapping new clean same-host native read-only mapping children; use a new clean native critic for each independent review; prohibit unassigned nested fanout; and have the parent account for every result, compare current repository state, synthesize accepted evidence, write the ledger, and own repair direction and verdict. Select a child only when it inherits the sanctioned simulator or device capabilities required by `audit-loop-sim`; missing capability leaves the work with the authorized parent and does not authorize external transport as a bypass. Otherwise map sequentially. Choose the front from that map, fix bugs inside the existing product, journey, and automation contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. Every editful pass must then audit the resulting diff and touched surfaces for safety, downstream consequences, elegance, and duplication before it can count as done. Do not introduce duplicate product logic, duplicate lane behavior, duplicate harness steps, or duplicate fallback handling as a shortcut. When the repo provides `mobile-sim`, use it for simulator or device control. If the current review context cannot inspect the sanctioned runtime surface cleanly, record that state as `unknown`, not `BLOCKED`. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current automation risk front or make verification unsafe. `review` is parent-integrated and docs-only. `auto` is native goal-mode friendly: run `run`, run a new clean critic, then repeat until the parent accepts `CLEAN` or `BLOCKED`. A post-turn background or external launch supplies lifecycle continuity, not critic freshness or simulator authority. This package does not install or arm automation hooks."

policy:
  allow_implicit_invocation: true
