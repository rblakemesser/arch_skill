interface:
  display_name: "Audit Loop"
  short_description: "Run an exhaustive map-first repo audit loop with a root audit ledger; supports Codex-only auto continuation"
  default_prompt: "Use $audit-loop for a repo-wide audit pass that first exhaustively maps shipped code surfaces and the current proof surface before any edits, then ranks risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick patch before the map is complete. In runtimes that support delegation, use parallel read-only agents during the mapping phase; otherwise build the same map sequentially. Choose the front from that map, fix bugs inside the existing product and API contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. A pass may cross multiple files, modules, and tests when they serve the same risk story. When you add or materially rewrite a test, leave comments in the test that explain why the behavior matters and what correct user-visible or externally observable outcome should happen. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current risk front or make verification unsafe. `review` is docs-only; `auto` is the Codex-only controller and must fail loud if the repo-managed `Stop` entry in `~/.codex/hooks.json`, the installed runner at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`, or `codex_hooks` is missing. Do not preflight against a copied hook file under `~/.codex/hooks/`. Do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
