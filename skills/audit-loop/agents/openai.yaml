interface:
  display_name: "Audit Loop"
  short_description: "Run an exhaustive map-first repo audit loop with a root audit ledger; supports native goal-mode auto continuation"
  default_prompt: "Use $audit-loop for a repo-wide audit pass that first exhaustively maps shipped code surfaces and the current proof surface before any edits, then ranks risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick patch before the map is complete. Apply the shared agent policy: when independent surface families justify fanout, use bounded non-overlapping new clean same-host native read-only mapping children; use a new clean native critic for each independent review; prohibit unassigned nested fanout; and have the parent account for every result, compare current repository state, synthesize accepted evidence, write the ledger, and own repair direction and verdict. Otherwise map sequentially. Choose the front from that map, fix bugs inside the existing product and API contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. Every editful pass must then audit the resulting diff and touched surfaces for safety, downstream consequences, elegance, and duplication before it can count as done. If that audit fails, repair the issue in the same pass and re-verify. Do not introduce duplicate code, duplicate assertions, or duplicate fallback handling as a shortcut. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current risk front or make verification unsafe. `review` is parent-integrated and docs-only. `auto` is native goal-mode friendly: run `run`, run a new clean critic, then repeat until the parent accepts `CLEAN` or `BLOCKED`. A post-turn background or external launch supplies lifecycle continuity, not critic freshness. This package does not install or arm automation hooks."

policy:
  allow_implicit_invocation: true
