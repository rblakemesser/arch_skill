interface:
  display_name: "Audit Loop"
  short_description: "Run an exhaustive map-first repo audit loop with a root audit ledger; supports native goal-mode auto continuation"
  default_prompt: "Use $audit-loop for a repo-wide audit pass that first exhaustively maps shipped code surfaces and the current proof surface before any edits, then ranks risk fronts by consequence first, proof weakness second, and fragility third. Do not land a quick patch before the map is complete. In runtimes that support delegation, use parallel read-only agents during the mapping phase; otherwise build the same map sequentially. Choose the front from that map, fix bugs inside the existing product and API contracts, and make the proof depth proportional to the front's downstream consequence and blast radius. Every editful pass must then audit the resulting diff and touched surfaces for safety, downstream consequences, elegance, and duplication before it can count as done. If that audit fails, repair the issue in the same pass and re-verify. Do not introduce duplicate code, duplicate assertions, or duplicate fallback handling as a shortcut. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current risk front or make verification unsafe. `review` is docs-only. `auto` is native goal-mode friendly: run `run`, run fresh `review`, then repeat until review says `CLEAN` or `BLOCKED`. This package does not install or arm automation hooks."

policy:
  allow_implicit_invocation: true
