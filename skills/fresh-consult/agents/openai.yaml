interface:
  display_name: "Fresh Consult"
  short_description: "Run resumable Claude, Codex, Cursor, or Grok opinions"
  default_prompt: "Use $fresh-consult to run one or more read-only Claude Fable/Opus, Codex GPT/GBT/Fugu, Cursor Composer, or Grok second opinions on this artifact, completion check, flow, or readability question. First turns start clean; second and third same-line follow-ups resume the captured child session by default. Codex accepts gpt-5.6-sol, gpt-5.6-luna, and gpt-5.6-terra and defaults an omitted Codex model to gpt-5.6-sol. Claude Code runs supported Claude models, Cursor Agent runs composer-2.5-fast, and Grok runs grok-build or grok-composer-2.5-fast. Tell each consult child to return a strict pass/fail verdict: if it is not a clean yes, it fails with specific reasons. Report whether each verdict was fresh or resumed, with evidence, session id when present, and directories."

policy:
  allow_implicit_invocation: true
