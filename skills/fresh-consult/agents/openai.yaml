interface:
  display_name: "Fresh Consult"
  short_description: "Run clean Claude, Codex, Cursor, or Grok opinions"
  default_prompt: "Use $fresh-consult to run one or more clean-context Claude Opus, Codex GPT/GBT, Cursor Composer, or Grok second opinions on this artifact, completion check, flow, or readability question. Codex runs GPT/GBT, Claude Code runs Opus, Cursor Agent runs composer-2.5-fast, and Grok runs grok-build or grok-composer-2.5-fast. Tell each consult child: Maximize parallelism by using parallel agents. Do not invoke skills that spawn subagents. Report each verdict back with evidence and run directories."

policy:
  allow_implicit_invocation: true
