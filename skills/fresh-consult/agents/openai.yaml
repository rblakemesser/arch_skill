interface:
  display_name: "Fresh Consult"
  short_description: "Run a clean independent read-only reviewer"
  default_prompt: "Use $fresh-consult for a strict read-only second opinion. Fresh means a new clean reviewer, not inherently a CLI: use a clean native child for ordinary same-host review (`fork_turns: \"none\"` in Codex; a clean named/custom subagent in Claude), and select an external Claude, Codex, Cursor Agent, or Grok session only when its provider, exact-model/profile, lifecycle, isolation, automation, or receipt benefit matters. Resume the exact participant for bounded same-line follow-ups; start a new clean child for a new independent gate. The parent owns fanout and synthesis, and reviewers must not create children unless explicitly budgeted. Return strict pass/fail, evidence, confidence, transport/context/continuation, exact handle, and external receipt paths when applicable."

policy:
  allow_implicit_invocation: true
