interface:
  display_name: "Model Consensus"
  short_description: "Orchestrate two selected models to converge on a lean plan"
  default_prompt: "Use $model-consensus to have two selected Claude Fable/Opus, Codex GPT/GBT/Fugu, Cursor Composer, or Grok model sessions cross-check, critique, and converge on this plan, architecture, investigation, design, or concept. Codex accepts the gpt-5.6-sol, gpt-5.6-luna, and gpt-5.6-terra choices and defaults an omitted Codex model to gpt-5.6-sol. Claude Code runs supported Claude models, Cursor Agent runs composer-2.5-fast, and Grok runs grok-build or grok-composer-2.5-fast. Preserve the user's raw goal, ask once for other missing execution choices, require repo evidence when applicable, preserve child discovery freedom for investigations, and tell each participant: Maximize parallelism by using parallel agents. Do not invoke skills that spawn subagents. Do not introduce a deterministic runner, script, controller, or harness layer."

policy:
  allow_implicit_invocation: true
