interface:
  display_name: "Model Consensus"
  short_description: "Converge two participants with per-role transport"
  default_prompt: "Use $model-consensus to have two selected Claude, Codex, Cursor Agent, or Grok participants independently cross-check, critique, and converge on the leanest evidence-backed answer. Resolve transport per participant: prefer separate clean same-host native children when native model capability suffices (`fork_turns: \"none\"` in Codex; clean named/custom subagents in Claude), and use resumable external sessions for cross-provider or unavailable exact-model/profile needs. Resume each exact participant every round. Keep parent relay, fanout, evidence checking, and synthesis in the parent; participants must not create children unless explicitly budgeted. Preserve the raw goal, exact model resolution, repo evidence, discovery freedom, and no-runner contract."

policy:
  allow_implicit_invocation: true
