interface:
  display_name: "ChatGPT Web"
  short_description: "Query logged-in ChatGPT through BrowserOS"
  default_prompt: "Use $chatgpt-web to shape the user's ask with $prompt-authoring discipline when useful, then query the logged-in ChatGPT web UI through BrowserOS MCP in one ChatGPT tab. Default to ChatGPT Pro with Extended thinking when the user does not specify mode or effort, but respect explicit Instant, Thinking, Pro, Light, Standard, Extended, or Heavy requests. Run ChatGPT Web prompts serially, not in parallel, and wait patiently for Pro/Extended responses that can take 10+ minutes. Support up to 10 attachments through BrowserOS file upload. Fail loudly if BrowserOS MCP is unavailable or ChatGPT is not already logged in. Do not use OpenAI API calls, scripts, runners, hidden harnesses, or automated login."

policy:
  allow_implicit_invocation: true
