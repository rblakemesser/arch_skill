interface:
  display_name: "Cynical Cruft Removal"
  short_description: "Find low-value repo artifacts that should go away."
  default_prompt: "Use $cynical-cruft-removal to review the requested repo or change set. Assume references are not proof of value. For plan-, branch-, conductor-, PR-, or history-backed work, reconstruct the initial human scope, frozen pre-implementation convergence closure, later human approvals, review waves, and final artifacts. Current reachability and product use do not authorize scope. Group live code, tests, schemas, configs, docs, dependencies, and ops surfaces created through unauthorized post-freeze expansion or scope cycling as one scope-laundered cruft cluster; hard-fail with the existing cruft-found verdict and default to subtraction. Also hunt dead code, self-referential islands, V1/V2 shadows, stale flags, worthless tests, unused dependencies, obsolete configs/scripts, generated artifacts, and stale docs/examples. For broad reviews, apply the shared agent policy and use only as many non-overlapping new clean native read-only children as improve coverage; children do not fan out unless the parent assigns a nested scope and budget, and the parent accounts for evidence and checks repository state. Save under /tmp/cynical-cruft-removal/. Do not edit files, invoke external reviewers, manually spawn coding-harness executables, build a runner/harness, or drift into normal QA/test/doc review."

policy:
  allow_implicit_invocation: true
