interface:
  display_name: "Plan Audit"
  short_description: "Generic quality audit for planning docs"
  default_prompt: "Use $plan-audit to audit this planning artifact in whatever format it uses. Improve plan quality against repo truth when repo-backed: North Star, done-state requirements, real ambiguity, constraints, tiny-team simplicity, depth-first risk, elegant architecture, existing-pattern fit, drift-proofing, side doors, deletes, and proof gaps. Read all relevant code before approving repo-backed plans. For broad repo-backed audits, use native subagents or parallel-agent features provided by the current coding harness whenever available. Do not manually spawn separate coding-harness executables or invoke skills whose main effect is to shell out to `codex`, `claude`, or `agent` unless explicitly assigned. Do not dictate the user's workflow and do not create scripts, runners, controllers, scorers, or deterministic harnesses."

policy:
  allow_implicit_invocation: true
