interface:
  display_name: "Plan Audit"
  short_description: "Generic plan audit and plan-backed code review"
  default_prompt: "Use $plan-audit to audit this planning artifact in its native format, or to run plan-backed implementation code review. Recover the human-authorized outcome, the initial architecture's pre-freeze minimal convergence closure, the freeze anchor, and explicit later human approvals. Map every durable obligation to those anchors; the latest plan text, audit findings, reviewers, and already-built code are not scope authority. Never add adjacent scope from audit: before freeze route the gap to the planning owner, and after freeze require a human decision. Give every material finding a scope disposition. Unauthorized built scope is a blocking IMP subtraction finding even when a later plan edit includes it. Also audit North Star, ambiguity, tiny-team simplicity, depth-first risk, owner paths, side doors, deletes, drift, and proof. Do not run tests, builds, lint, or CI; accept supplied test-pass context. For broad independent lenses, apply the shared agent policy and use non-overlapping new clean native read-only children; children do not fan out unless the parent assigns a nested scope and budget, and the parent accounts for evidence, deduplicates findings, owns dispositions and verdict, and checks repository state. Do not create scripts, runners, controllers, scorers, or deterministic harnesses."

policy:
  allow_implicit_invocation: true
