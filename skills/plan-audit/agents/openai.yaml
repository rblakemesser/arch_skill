interface:
  display_name: "Plan Audit"
  short_description: "Generic plan audit and plan-backed code review"
  default_prompt: "Use $plan-audit to audit this planning artifact in whatever format it uses, or to run implementation-audit code review when code already exists for a plan. For plan-readiness, improve North Star, done-state requirements, ambiguity, constraints, tiny-team simplicity, depth-first risk, architecture, side doors, deletes, drift, and proof gaps. For implementation-audit, review code against the plan for owner path, SSOT, side-door closure, drift, caller fit, elegance, and changed tests as code only. Do not run tests, builds, lint, or CI; do not ask for test logs; accept supplied test-pass context. Use native subagents for broad read-only slices when available. Do not manually spawn separate coding-harness executables or create scripts, runners, controllers, scorers, or deterministic harnesses."

policy:
  allow_implicit_invocation: true
