interface:
  display_name: "Plan Conductor"
  short_description: "Whole-plan conductor with Terra delivery shortcut"
  default_prompt: "Use $plan-conductor to drive an existing plan to verified completion with the parent as architect, integrator, and cynical non-implementing reviewer. Before dispatch, recover the human-authorized outcome, smallest sufficient solution, frozen initial convergence closure, freeze anchor, enough proof, do-not-build boundary, and later human approvals; do not dispatch an overbroad, provenance-free, or unfrozen plan. Prefer clean native same-host phase workers from the plan and conductor log, resume the exact worker for accepted repair findings, and start cold critics clean. Choose an external worker only for a concrete provider, exact model/profile, lifecycle, isolation, automation, receipt, or comparable benefit; keep the explicit Terra preset external and exact. The parent owns fanout and integration, and child prompts forbid nested delegation unless explicitly assigned. Audit factual validity separately from scope authority: only authorized and frozen-convergence findings become send-backs; new scope needs a human, unauthorized built scope is subtracted, and review repetition never creates authority."

policy:
  allow_implicit_invocation: true
