interface:
  display_name: "Plan Swarm"
  short_description: "Parallel plan-phase implementation orchestrator"
  default_prompt: "Use $plan-swarm to implement one named phase from an existing plan document by extracting the phase contract, decomposing it into independently delegable slices, launching/resuming parallel workers with $agent-delegate, committing local progress checkpoints freely, coordinating verification manually, writing worklogs next to the plan, and closing only after arbiter and thermonuclear findings are triaged."

policy:
  allow_implicit_invocation: true
