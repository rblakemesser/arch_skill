interface:
  display_name: "Miniarch Step"
  short_description: "Run the trimmed full-arch workflow"
  default_prompt: "Use $miniarch-step for the trimmed full-arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `phase-plan`, `auto-plan`, `implement`, `implement-loop`, `auto-implement`, `audit-implementation`, `status`, or `advance`. Use it when the work still needs canonical architecture grounding, phased execution, and real auto controllers, but does not need the broader staged surface of `arch-step`. It is a trimmed command surface, not a lower-effort workflow. Before Section 7 hardens, inspect adjacent surfaces tied to the same contract family, source of truth, migration boundary, or parity story; include them now, assign them to a named later phase, explicitly exclude them, or ask one exact blocker question instead of silently leaving them contradictory. Compatibility posture is separate from `fallback_policy`, so do not assume backward compatibility by default. For modern Section 7 docs, `Work` is explanatory only: every required phase obligation must live in `Checklist (must all be done)` or `Exit criteria (all required)`, and fresh audit must validate both before a phase can stay complete. Do not declare a plan ready while unresolved decisions remain, do not silently cut approved behavior or implementation scope, and do not rewrite plan requirements, scope, acceptance criteria, or phase obligations during implementation to make unfinished work look done; if repo evidence cannot settle a plan-shaping choice, ask the user instead of guessing. During `implement` and `implement-loop`, execute the current approved ordered implementation frontier: the earliest incomplete or reopened phase plus later phases whose prerequisites and proof gates are reachable in this arc. Credible proof supports that run, but it does not justify stopping after one local win while more approved work is due. Named later expansion is not current missing work until its proof gate is due; silent removal from the destination map is still a scope cut. The user may be editing files in parallel; do not revert unexpected user changes. If a task-relevant file changes underneath you, stop and report the file before continuing. If a miniarch planning step explicitly uses parallel agents, spawn those planning agents with model `gpt-5.4-mini` and reasoning effort `xhigh`. `auto-plan`, `implement-loop`, and `auto-implement` are the user-facing controller commands; do not run the Stop hook yourself, and after the controller is armed just end the turn and let the installed Stop hook run. Every hook-backed arm runs `arch_controller_stop_hook.py --ensure-installed --runtime <codex|claude>` first; the installer is idempotent and flock-guarded and writes the canonical `Stop` entry (and the `SessionStart` entry on Claude). If `--ensure-installed` fails loud, repair the named prerequisite and rerun. For `auto-plan`, `DOC_PATH` is the planning ledger and the armed controller state lives under `.codex/` in Codex or `.claude/arch_skill/` in Claude Code. On a fresh doc the parent pass runs only `research`, and on reruns the Stop hook resumes from the first incomplete stage already visible in the doc through `deep-dive` and `phase-plan`, then owns the successful handoff. For `implement-loop` and `auto-implement`, arm runtime-local implement-loop state before implementation work, keep implementing until the current ordered frontier is done or genuinely blocked, and only then let fresh audit run. In Codex, the Stop-hook fresh audit child for miniarch runs with `--model gpt-5.4-mini` and `-c model_reasoning_effort=\"xhigh\"`. In Claude Code, fresh audit cycles also require hook-suppressed Claude child runs via `claude -p --settings '{\"disableAllHooks\":true}'` to work with normal host auth. If the installed runtime support is absent or disabled, fail loud instead of pretending prompt-only chaining is real automation. After a clean code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
