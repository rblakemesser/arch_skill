interface:
  display_name: "Miniarch Step"
  short_description: "Run the trimmed full-arch workflow"
  default_prompt: "Use $miniarch-step for the trimmed full-arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `phase-plan`, `auto-plan`, `implement`, `implement-loop`, `auto-implement`, `full-auto`, `audit-implementation`, `status`, or `advance`. Use it when the work still needs canonical architecture grounding and phased execution but not the broader `arch-step` surface. Build the human-authorized outcome with the smallest sufficient solution. During initial architecture only, include the smallest evidenced same-contract cutover needed to avoid competing authority, record it in the Scope and Simplicity Contract, and freeze it before implementation. After freeze, only explicit human approval expands scope; workers, reviewers, plan edits, and Decision Log entries do not. A newly discovered adjacent path becomes a human decision, not an automatic repair. Every required phase obligation belongs in `Checklist (must all be done)` or `Exit criteria (all required)`. During `implement` and `implement-loop`, execute only the frozen approved frontier and subtract unauthorized work. In goal mode, continue until the command's proof bar is met or a true blocker stops the run. Outside goal mode, run one bounded stage or implement/audit pass and name the exact next command. For `auto-plan` and independent audits, prefer new clean same-host native analysis-only children when the host can satisfy the role; use read-only capability when available plus explicit no-write/no-fanout briefs, and keep repo-state checks, plan/audit writes, and synthesis with the parent. Treat `gpt-5.4-mini`/`xhigh` as a preference only when the native schema can select and confirm it; otherwise use inherited native capability without claiming an unconfirmed model. When an external exact-model lane is selected, state the load-bearing benefit that makes its added process and integration cost worthwhile. For `auto-plan`, run research, deep-dive, and phase-plan from doc truth. For `full-auto`, require the normal section-quality readiness bar before implementation and plan before implementation. After a clean code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
