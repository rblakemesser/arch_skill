interface:
  display_name: "Miniarch Step"
  short_description: "Run the trimmed full-arch workflow"
  default_prompt: "Use $miniarch-step for the trimmed full-arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `phase-plan`, `auto-plan`, `implement`, `implement-loop`, `auto-implement`, `full-auto`, `audit-implementation`, `status`, or `advance`. Use it when the work still needs canonical architecture grounding, phased execution, and native goal-mode auto flow, but does not need the broader staged surface of `arch-step`. It is a trimmed command surface, not a lower-effort workflow. Before Section 7 hardens, inspect adjacent surfaces tied to the same contract family, source of truth, migration boundary, or parity story; include them now, assign them to a named later phase, explicitly exclude them, or ask one exact blocker question. For modern Section 7 docs, every required phase obligation must live in `Checklist (must all be done)` or `Exit criteria (all required)`, and fresh audit must validate both before a phase can stay complete. During `implement` and `implement-loop`, execute the current approved ordered implementation frontier: the earliest incomplete or reopened phase plus later phases whose prerequisites and proof gates are reachable in this arc. `auto-plan`, `implement-loop`, `auto-implement`, and `full-auto` are native goal-mode friendly commands; this package does not install or arm automation hooks. In goal mode, continue until the command's proof bar is met or a true blocker stops the run. Outside goal mode, run one bounded stage or implement/audit pass and name the exact next command. For `auto-plan`, run research, deep-dive, and phase-plan from doc truth. For `full-auto`, read `references/full-auto.md`, require the normal section-quality readiness bar before implementation, and plan before implementation. After a clean code audit, hand off docs cleanup using the feature as context to `$arch-docs`."

policy:
  allow_implicit_invocation: true
